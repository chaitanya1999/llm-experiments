<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Knowledge Graph POC</title>
		<link rel="stylesheet" href="/styles.css">
	</head>
	<body>
		<main class="app-shell">
			<section class="graph-panel" aria-labelledby="graph-title">
				<header class="panel-header">
					<div>
						<p class="eyebrow">Knowledge Graph</p>
						<h1 id="graph-title">Graph preview</h1>
					</div>
					<div class="graph-stats" id="graph-stats">Loading...</div>
				</header>
				<div class="graph-stage" id="graph-stage">
					<div id="graph-container" role="img" aria-label="Knowledge graph preview"></div>
					<div class="empty-state" id="empty-state" hidden>
						<h2>No graph data yet</h2>
						<p>Ingest text from the chat panel to populate the preview.</p>
					</div>
				</div>
			</section>

			<aside class="chat-panel" aria-labelledby="chat-title">
				<header class="panel-header chat-header">
					<div>
						<p class="eyebrow">LLM Workspace</p>
						<h2 id="chat-title">Ask or ingest</h2>
					</div>
				</header>

				<div class="messages" id="messages" aria-live="polite">
					<article class="message assistant">
						<div class="bubble">
							Paste a question and choose Ask, or paste source text and choose Ingest.
						</div>
					</article>
				</div>

				<form class="composer" id="composer">
					<label class="sr-only" for="text-input">Text input</label>
					<textarea id="text-input" rows="5" placeholder="Type a question or knowledge text..."></textarea>
					<div class="actions">
						<button type="button" id="ask-button">Ask</button>
						<button type="button" id="ingest-button" class="primary">Ingest</button>
					</div>
				</form>
			</aside>
		</main>

		<script src="/app.bundle.js" type="module"></script>
	</body>
</html>
